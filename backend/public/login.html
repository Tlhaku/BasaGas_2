<!DOCTYPE html>
<html lang="en" ng-app="basagasApp">
<head>
  <meta charset="UTF-8" />
  <title>BasaGas Login</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="libs/angular.min.js"></script>
  <script src="scripts/app.js"></script>
</head>
<body ng-controller="LoginController as ctrl">
  <header>
    <div class="container">
      <h1>BasaGas</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/order.html">Order</a>
        <a href="/pricing.html">Pricing</a>
        <a href="/login.html">Login</a>
        <a href="/tracking.html">Track</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2>Customer Login</h2>
    <form ng-submit="ctrl.login()" class="form">
      <label>Email
        <input type="email" ng-model="ctrl.credentials.email" required />
      </label>
      <label>Password
        <input type="password" ng-model="ctrl.credentials.password" required />
      </label>
      <button type="submit" class="btn">Login</button>
      <p class="error" ng-if="ctrl.error">{{ctrl.error}}</p>

    </form>
  </main>
</body>
</html>
