<!DOCTYPE html>
<html lang="en" ng-app="basagasApp">
<head>
  <meta charset="UTF-8" />
  <title>Track Order</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="libs/angular.min.js"></script>
  <script src="scripts/app.js"></script>
</head>
<body ng-controller="TrackingController as ctrl">
  <header>
    <div class="container">
      <h1>BasaGas</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/order.html">Order</a>
        <a href="/pricing.html">Pricing</a>
        <a href="/login.html">Login</a>
        <a href="/tracking.html">Track</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2>Track Your Cylinders</h2>
    <div id="tracking-map" class="map"></div>
    <table class="pricing-table">
      <tr><th>Cylinder</th><th>Status</th></tr>
      <tr ng-repeat="c in ctrl.cylinders"><td>{{c.id}}</td><td>{{c.status}}</td></tr>
    </table>
  </main>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initTrackingMap"></script>
</body>
</html>
